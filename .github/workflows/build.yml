name: 'Build'

env:
  BUILD_TYPE: Release
  ARCH: x64
  VCPKG_CONFIG: Release
  VCPKG_HASH: c27eeddba73f608f10605d80bc0144c1166f8fb7

on: [push, workflow_dispatch]

# Gives the workflow permissions to clone the repo and create a page deployment
permissions:
    id-token: write
    pages: write

jobs:
  build-win:
    strategy:
      fail-fast: false
      matrix:
        config: [ {triplet: x64-windows-static, suffix: '-static'}, {triplet: x64-windows, suffix: '-dynamic' } ]
    runs-on: windows-latest 
    name: 'Windows Binary'
    env:
      VCPKG_DEFAULT_VCPKG_TRIPLET: ${{ matrix.config.triplet }}
      VCPKG_TRIPLET: ${{ matrix.config.triplet }}

    steps:
      
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: create variables
      run: |
        $VERSION = (Get-Content docs/release-notes.md -Head 1).Trim() -replace '[ #]', ''
        Add-Content -Path $env:GITHUB_ENV -Value "VERSION=$VERSION"
      shell: pwsh

    - name: print variables
      run: |
        Write-Host "VERSION: ${{ env.VERSION }}"
      shell: pwsh

    - name: pre-build patch script
      run: .\pre-build.ps1
      shell: pwsh

    - uses: friendlyanon/setup-vcpkg@v1
      # seems like the absense of commit hash expects vcpkg submodule, i don't want that
      with:
        committish: ${{ env.VCPKG_HASH }} 
        # set to false to clear any cache in case of build errors
        cache: false

    # - name: Setup Python
    #   uses: actions/setup-python@v4
    #   with:
    #     python-version: '3.11' 

    - name: ⚙️ configure
      run: >
        cmake -B build -S .
        -D CMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
        -D "CMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake"
        -D "VCPKG_TARGET_TRIPLET=${{ env.VCPKG_TRIPLET }}"
      working-directory: . 

    - name: 🏭 build
      run: cmake --build build --config ${{ env.VCPKG_CONFIG }}
      working-directory: . 

    - name: debug
      run: ls -R
      working-directory: build/test


    - name: 🧪 unit tests
      run: .\test.exe
      working-directory: build/test/Release

    - name: Create artifacts directory
      run: mkdir atf        

    # put the following inside "atf" subdir:
    # 1. msi installer, renamed after version number (removed in 5.5.1)
    # 2. zipped .exe
    # 3. version.txt containing version number
    - name: prep artifacts
      run: |
        cp build/bt/Release/bt.exe atf/
        cp build/bt/Release/bt.pdb atf/
        "${{ env.VERSION }}" | Out-File atf/version.txt -NoNewline
        cp docs/release-notes.md atf/
        cp docs/instructions.md atf/

    - uses: actions/upload-artifact@v7
      name: collect binaries
      with:
        name: bin${{ matrix.config.suffix }}
        path: atf/*
        if-no-files-foujnd: error
        compression-level: 9

  screenshots-win:
    runs-on: windows-latest
    needs: build-win
    name: '🖥️ Windows Screenshots'

    steps:
    - uses: actions/download-artifact@v5
      with:
        name: bin-static
        path: atf

    - name: Capture bt screenshots
      shell: pwsh
      run: |
        Add-Type -AssemblyName System.Drawing
        Add-Type -AssemblyName System.Windows.Forms

        New-Item -ItemType Directory -Path screenshots -Force | Out-Null

        function Save-Screenshot([string]$Path) {
          $bounds = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
          $bitmap = New-Object System.Drawing.Bitmap $bounds.Width, $bounds.Height
          $graphics = [System.Drawing.Graphics]::FromImage($bitmap)
          $graphics.CopyFromScreen($bounds.Location, [System.Drawing.Point]::Empty, $bounds.Size)
          $bitmap.Save($Path, [System.Drawing.Imaging.ImageFormat]::Png)
          $graphics.Dispose()
          $bitmap.Dispose()
        }

        $pick = Start-Process -FilePath "$PWD\atf\bt.exe" -ArgumentList "discover" -PassThru
        Start-Sleep -Seconds 3

        $bt = Start-Process -FilePath "$PWD\atf\bt.exe" -PassThru
        Start-Sleep -Seconds 3
        Save-Screenshot "$PWD\screenshots\config.png"
        if ($bt -and -not $bt.HasExited) { Stop-Process -Id $bt.Id -Force }

        $pick = Start-Process -FilePath "$PWD\atf\bt.exe" -ArgumentList "pick", "https://bbc.co.uk" -PassThru
        Start-Sleep -Seconds 3
        Save-Screenshot "$PWD\screenshots\picker.png"

        if ($pick -and -not $pick.HasExited) { Stop-Process -Id $pick.Id -Force }
        if ($bt -and -not $bt.HasExited) { Stop-Process -Id $bt.Id -Force }

    - uses: actions/upload-artifact@v7
      with:
        name: screenshots
        path: screenshots/*.png
        if-no-files-found: error


  release:
    runs-on: ubuntu-latest 
    name: '🚀 Release'
    needs: [build-win, screenshots-win]
    if: github.ref == 'refs/heads/master'
    environment:
      name: release

    steps:
      
      - name: ⬇️ Download binaries
        uses: actions/download-artifact@v8
        with:
          name: bin-static

      - name: ⬇️ Download screenshots
        uses: actions/download-artifact@v8
        with:
          name: screenshots

      - name: 🔍 view artifacts to be used
        run: ls -R
        working-directory: .

      - name: 🔢 set version environment variable
        run: |
          echo "VERSION=$(cat version.txt | xargs)" >> "$GITHUB_ENV"

      - name: 🔢 prep release notes / artifacts
        run: |
          envsubst < instructions.md > g.tmp && mv g.tmp instructions.md
          grep -m 2 -B 1000 '^## ' release-notes.md | tail -n +3 | head -n -2 > final_notes.md
          cat instructions.md >> final_notes.md
          cat final_notes.md
          zip -9 bt.zip bt.exe
          zip -9 bt.pdb.zip bt.pdb

      - name: 🔍 view artifacts to be used
        run: ls -R
        working-directory: .


      # https://github.com/softprops/action-gh-release
      - name: 📦 create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          files: |
            bt.zip
            bt.pdb.zip
            *.png
          body_path: final_notes.md


