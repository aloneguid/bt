name: 'Build'

env:
  BUILD_TYPE: Release
  VCPKG_HASH: 5d35de2ee8b13d0bcec328153605638a74fbbf84

on:
  push:
    branches:
      - master
      - linux
    tags:
      - 'v*'              # release only when pushing a version tag
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Create GitHub release'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ${{ matrix.os }}
    # allow Linux build to fail while prototyping
    # continue-on-error: ${{ matrix.os == 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows x64
            vcpkg_triplet: x64-windows-static
            vcpkg_config: Release
            artifact_suffix: -win-x64
            artifact_pattern: '*.msi'
          - os: ubuntu-latest
            name: Linux x64
            vcpkg_triplet: x64-linux
            vcpkg_config: MinSizeRel
            artifact_suffix: -linux-x64
            artifact_pattern: '*.deb'

    name: 'build: ${{ matrix.name }}'
    env:
      VCPKG_DEFAULT_VCPKG_TRIPLET: ${{ matrix.vcpkg_triplet }}
      VCPKG_TRIPLET: ${{ matrix.vcpkg_triplet }}

    steps:

    - name: 🐧 Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get --yes install cmake g++ gdb make ninja-build rsync zip libxinerama-dev libxcursor-dev xorg-dev libglu1-mesa-dev pkg-config autoconf autoconf-archive automake libtool dpkg-dev imagemagick xvfb

    - name: 🪟 Dependencies
      if: runner.os == 'Windows'
      run: |
        dotnet tool install --global wix
        wix eula accept wix7
        wix extension add --global WixToolset.UI.wixext

    - uses: actions/checkout@v6
      with:
        submodules: true

    - name: Create variables
      run: |
        $VERSION = (Get-Content docs/release-notes.md -Head 1).Trim() -replace '[ #]', ''
        Add-Content -Path $env:GITHUB_ENV -Value "VERSION=$VERSION"
        Write-Host "VERSION: ${{ env.VERSION }}"
      shell: pwsh

    # below seems to work on Linux, it looks like GHA has powershell/linux available already
    - name: pre-build patch script
      run: .\resources\ci\pre-build.ps1
      shell: pwsh

    - uses: friendlyanon/setup-vcpkg@v1
      # seems like the absense of commit hash expects vcpkg submodule, i don't want that
      with:
        committish: ${{ env.VCPKG_HASH }} 
        # set it to false to clear any cache in case of build errors
        cache: false

    - name: ⚙️ configure
      run: >
        cmake -B build -S .
        -D CMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
        -D "CMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake"
        -D "VCPKG_TARGET_TRIPLET=${{ env.VCPKG_TRIPLET }}"
        -D "CPACK_PACKAGE_VERSION=${{ env.VERSION }}"
      working-directory: . 

    - name: 🏭 build
      run: cmake --build build --config ${{ matrix.vcpkg_config }}
      working-directory: . 

#    - name: debug
#      run: ls -R
#      working-directory: build/bt

    - name: 🪟 🧪 unit tests
      if: runner.os == 'Windows'
      run: |
          .\test.exe
      working-directory: build/bt/Release

    - name: 🐧 🧪 unit tests
      if: runner.os == 'Linux'
      run: |
          ./test
      working-directory: build/bt

    - name: 📦 Package Installer
      run: |
        cpack -C ${{ matrix.vcpkg_config }}
      working-directory: build

    - name: 📋 Dump WiX log on failure
      if: failure() && runner.os == 'Windows'
      shell: pwsh
      run: |
        $log = "build/_CPack_Packages/win64/WIX/wix.log"
        if (Test-Path $log) { Get-Content $log }

    - name: prep artifacts
      run: |
        mkdir atf
        cp build/${{ matrix.artifact_pattern }} atf/
        echo -n "${{ env.VERSION }}" > atf/version.txt
        cp docs/release-notes.md atf/
        cp docs/instructions.md atf/

    - uses: actions/upload-artifact@v7
      name: collect binaries
      with:
        name: bin${{ matrix.artifact_suffix }}
        path: atf/*
        if-no-files-found: error
        compression-level: 9

  release-artifacts:
    runs-on: ubuntu-latest
    name: '📦 Prepare Release Artifacts'
    needs: [build]
    steps:
      - name: ⬇️ Download all artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true  # overwrites duplicate files

      - name: debug
        run: ls -R

  github-release:
    runs-on: ubuntu-latest
    name: '🚀 GitHub Release'
    needs: [release-artifacts]
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_release == true)
    permissions:
      contents: write
    environment:
      name: release

    steps:

      - name: ⬇️ Download binaries (Windows)
        uses: actions/download-artifact@v8
        with:
          name: bin-win-x64
          path: win

      - name: ⬇️ Download binaries (Linux)
        uses: actions/download-artifact@v8
        with:
          name: bin-linux-x64
          path: linux

      - name: 🔍 view artifacts to be used
        run: ls -R
        working-directory: .

      - name: 🔢 set version environment variable
        run: |
          echo "VERSION=$(cat win/version.txt | xargs)" >> "$GITHUB_ENV"

      - name: 🔢 prep release notes / artifacts
        run: |
          cp win/instructions.md .
          cp win/release-notes.md .
          cp win/bt.exe .
          cp win/bt.pdb .
          cp linux/*.deb .
          envsubst < instructions.md > g.tmp && mv g.tmp instructions.md
          grep -m 2 -B 1000 '^## ' release-notes.md | tail -n +3 | head -n -2 > final_notes.md
          cat instructions.md >> final_notes.md
          cat final_notes.md
          zip -9 bt.zip bt.exe
          zip -9 bt.pdb.zip bt.pdb

      - name: 🔍 view artifacts to be used
        run: ls -R
        working-directory: .


      # https://github.com/softprops/action-gh-release
      - name: 📦 create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.VERSION }}
          token: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          name: ${{ env.VERSION }}
          files: |
            bt.zip
            bt.pdb.zip
            *.deb
          body_path: final_notes.md